
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IEM Quality Check</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; font-size: 13px; color: #1e293b; background: #f8fafc; }

    .header { background: #1e3a5f; color: white; padding: 12px 16px; }
    .header h1 { font-size: 14px; font-weight: 700; }
    .header p  { font-size: 11px; color: #93c5fd; margin-top: 2px; }

    .content { padding: 16px; }

    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .field input[type="text"] { width: 100%; padding: 8px 10px; border: 1.5px solid #e2e8f0; border-radius: 6px; font-size: 13px; outline: none; background: #fff; }

    .upload-zone { border: 2px dashed #cbd5e1; border-radius: 8px; padding: 20px 12px; text-align: center; cursor: pointer; background: #fff; transition: all 0.15s; }
    .upload-zone:hover  { border-color: #2563eb; background: #eff6ff; }
    .upload-zone.has-file  { border-color: #22c55e; background: #f0fdf4; }
    .upload-zone.dragging  { border-color: #2563eb; background: #eff6ff; }
    .upload-zone .icon  { font-size: 24px; margin-bottom: 6px; }
    .upload-zone .label { font-size: 12px; font-weight: 600; color: #374151; }
    .upload-zone .sub   { font-size: 11px; color: #94a3b8; margin-top: 2px; }

    .btn { width: 100%; padding: 10px; border-radius: 8px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.15s; margin-top: 4px; }
    .btn-primary          { background: #1e3a5f; color: white; }
    .btn-primary:hover    { background: #1e40af; }
    .btn-primary:disabled { background: #e2e8f0; color: #94a3b8; cursor: not-allowed; }

    .status { margin-top: 12px; padding: 10px 12px; border-radius: 8px; font-size: 12px; line-height: 1.5; }
    .status.info    { background: #eff6ff; color: #1d4ed8; }
    .status.error   { background: #fee2e2; color: #991b1b; }
    .status.success { background: #f0fdf4; color: #166534; }

    .divider { height: 1px; background: #e2e8f0; margin: 14px 0; }

    .results h3 { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }

    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .stat { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px 12px; }
    .stat .val { font-size: 22px; font-weight: 800; color: #1e3a5f; }
    .stat .lbl { font-size: 10px; color: #94a3b8; text-transform: uppercase; }
    .stat.flagged .val { color: #dc2626; }

    .course-list { max-height: 220px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 8px; }
    .course-item { padding: 7px 10px; border-bottom: 1px solid #f1f5f9; background: #fff; display: flex; justify-content: space-between; align-items: center; gap: 6px; }
    .course-item:last-child { border-bottom: none; }
    .course-item.flagged { background: #fff7ed; }
    .course-name { font-size: 11px; font-weight: 500; color: #1e293b; flex: 1; line-height: 1.3; }
    .course-meta { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .badge { font-size: 10px; font-weight: 600; padding: 2px 5px; border-radius: 3px; white-space: nowrap; }
    .badge-sciences    { background: #dbeafe; color: #1e40af; }
    .badge-engineering { background: #fce7f3; color: #9d174d; }
    .badge-iem         { background: #dcfce7; color: #166534; }
    .badge-management  { background: #fef3c7; color: #92400e; }
    .badge-transversal { background: #f3e8ff; color: #6b21a8; }
    .badge-other       { background: #fee2e2; color: #991b1b; }

    .note { font-size: 10px; color: #94a3b8; line-height: 1.5; margin-top: 8px; }

    .toggle-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; padding: 10px 12px; background: #fff; border: 1.5px solid #e2e8f0; border-radius: 8px; cursor: pointer; }
    .toggle-row:hover { border-color: #2563eb; background: #f8faff; }
    .toggle-row.active { border-color: #2563eb; background: #eff6ff; }
    .toggle-row input[type="checkbox"] { width: 15px; height: 15px; accent-color: #1e3a5f; cursor: pointer; flex-shrink: 0; }
    .toggle-row .toggle-label { font-size: 12px; font-weight: 600; color: #374151; }
    .toggle-row .toggle-sub   { font-size: 10px; color: #94a3b8; margin-top: 1px; }

    .loading { text-align: center; padding: 24px 0; }
    .loading .spinner { font-size: 28px; display: inline-block; animation: spin 1s linear infinite; }
    .loading p { font-size: 12px; color: #64748b; margin-top: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="header">
  <h1>IEM Quality Check</h1>
  <p>ESTIEM · Education Committee</p>
</div>

<div class="content">
  <div class="field">
    <label>University Name (optional)</label>
    <input type="text" id="uniName" placeholder="e.g. TU Berlin">
  </div>

  <div class="field">
    <label>Curriculum PDF</label>
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
      <div class="icon" id="uploadIcon">📄</div>
      <div class="label" id="uploadLabel">Drop PDF or click to browse</div>
      <div class="sub"   id="uploadSub">Curriculum files only</div>
    </div>
    <input type="file" id="fileInput" accept=".pdf" style="display:none">
  </div>

  <label class="toggle-row" id="toggleRow">
    <input type="checkbox" id="compareMode">
    <div>
      <div class="toggle-label">📅 Annual check</div>
      <div class="toggle-sub">Compare against existing "AI Review" sheet</div>
    </div>
  </label>

  <button class="btn btn-primary" id="analyzeBtn" disabled onclick="analyze()">
    Analyze &amp; Fill Sheet →
  </button>

  <div id="statusArea"></div>
  <div id="resultsArea"></div>
</div>

<script>
// ── Toggle ──────────────────────────────────────────────────────
document.getElementById('compareMode').addEventListener('change', function() {
  document.getElementById('toggleRow').classList.toggle('active', this.checked);
  document.getElementById('analyzeBtn').textContent =
    this.checked ? 'Analyze & Compare →' : 'Analyze & Fill Sheet →';
});

// ── PDF.js init ─────────────────────────────────────────────────
window.pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── State ───────────────────────────────────────────────────────
let selectedFile = null;

// ── File handling ───────────────────────────────────────────────
const uploadZone = document.getElementById('uploadZone');
const fileInput  = document.getElementById('fileInput');

uploadZone.addEventListener('dragover',  e => { e.preventDefault(); uploadZone.classList.add('dragging'); });
uploadZone.addEventListener('dragleave', ()  => uploadZone.classList.remove('dragging'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('dragging');
  setFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => setFile(e.target.files[0]));

function setFile(f) {
  if (!f || f.type !== 'application/pdf') return;
  selectedFile = f;
  uploadZone.classList.add('has-file');
  document.getElementById('uploadIcon').textContent  = '✅';
  document.getElementById('uploadLabel').textContent = f.name;
  document.getElementById('uploadSub').textContent   = (f.size / 1024).toFixed(0) + ' KB · Click to change';
  document.getElementById('analyzeBtn').disabled = false;
  document.getElementById('statusArea').innerHTML  = '';
  document.getElementById('resultsArea').innerHTML = '';
}

// ── PDF extraction ──────────────────────────────────────────────
async function extractText(file) {
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  let text = '';
  for (let i = 1; i <= Math.min(pdf.numPages, 25); i++) {
    const page    = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(x => x.str).join(' ') + '\n';
  }
  return text;
}

// ── Framework ───────────────────────────────────────────────────
const FRAMEWORK = `You are an expert classifier for Industrial Engineering and Management (IEM) university curricula in Europe.

CLASSIFICATION FRAMEWORK:

SCOPE: Sciences
- Mathematics: Calculus, Linear Algebra, Statistics, Probability, Numerical Methods
- Natural Sciences: Physics, Chemistry, Biology, Environmental Science, Materials Science
- Informatics & Computing: Programming, Data Structures, Algorithms, Databases, Software Engineering

SCOPE: Engineering
- Mechanical Engineering: Thermodynamics, Fluid Mechanics, Machine Design, Manufacturing Processes
- Electrical Engineering: Circuit Theory, Electronics, Control Systems, Signal Processing
- Civil & Construction Engineering: Structural Analysis, Construction Management
- Chemical & Process Engineering: Chemical Processes, Reaction Engineering, Process Control
- Other Engineering: General engineering disciplines

SCOPE: Applied Industrial and Management Engineering (IEM)
- Operations Research & Optimization: Linear Programming, Optimization, Decision Theory, Scheduling
- Production & Operations Management: Manufacturing Systems, Lean, Six Sigma, Industry 4.0
- Quality Management: Quality Control, TQM, ISO Standards, Reliability Engineering
- Supply Chain & Logistics: Inventory, Distribution, Procurement, Transportation
- Industrial Engineering Methods: Work Study, Ergonomics, Facility Layout, Simulation
- Project & Engineering Management: Project Planning, Risk Management, Systems Engineering

SCOPE: Management
- Business Administration & Management: Organizational Behavior, Business Administration
- Economics: Micro/Macroeconomics, Industrial Economics, Econometrics
- Finance & Accounting: Financial Management, Cost Accounting, Controlling, Investment
- Marketing & Sales: Marketing Management, Consumer Behavior
- Human Resources & Leadership: HRM, Leadership, Organizational Development
- Strategy & Innovation: Strategic Management, Entrepreneurship, Innovation Management

SCOPE: Transversal
- Foreign Languages: English, German, French, Spanish, any language course
- Communication & Presentation: Technical Writing, Presentation Skills, Academic Writing
- Ethics, Law & Sustainability: Engineering Ethics, Business Law, CSR, Sustainable Development
- Soft Skills & Personal Development: Teamwork, Intercultural Competence, Career Development

SCOPE: Other — use ONLY when nothing fits. Always flag.
CONFIDENCE: high = clearly fits | medium = likely correct | low = uncertain, must flag.
FLAG when: confidence is low, scope is Other, or course equally fits 2+ categories.`;

// ── Main analysis ───────────────────────────────────────────────
async function analyze() {
  if (!selectedFile) return;

  setStatus('info', '⏳ Extracting text from PDF...');
  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('resultsArea').innerHTML = '';

  try {
    const text    = await extractText(selectedFile);
    const uniName = document.getElementById('uniName').value.trim();

    setStatus('info', '🤖 Classifying with Claude Haiku...');

    const prompt = `Analyze this university curriculum${uniName ? ' for ' + uniName : ''}.
Extract ALL courses and classify each using the IEM framework.
Return ONLY valid JSON — no markdown, no preamble.

Curriculum text:
${text.slice(0, 9000)}

Return exactly this structure:
{
  "university": "${uniName || 'Unknown'}",
  "total_courses": <number>,
  "flagged_count": <number>,
  "courses": [
    {
      "name": "<course name>",
      "ects": <number or null>,
      "type": "<Mandatory|Elective|Unknown>",
      "scope": "<Sciences|Engineering|Applied Industrial and Management Engineering|Management|Transversal|Other>",
      "area": "<specific area name>",
      "confidence": "<high|medium|low>",
      "flag": <true|false>,
      "flag_reason": "<string or null>"
    }
  ]
}`;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 4000,
        system: FRAMEWORK,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    const raw    = data.content.map(b => b.text || '').join('');
    const clean  = raw.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    setStatus('info', '📊 Writing to Excel sheet...');
    const compareMode = document.getElementById('compareMode').checked;
    let oldCourses = null;

    if (compareMode) {
      setStatus('info', '📂 Reading previous AI Review sheet...');
      oldCourses = await readExistingReview();
      if (!oldCourses) {
        setStatus('info', '⚠️ No existing "AI Review" sheet found — running fresh analysis.');
      }
    }

    await writeToExcel(parsed);

    if (compareMode && oldCourses) {
      setStatus('info', '🔍 Comparing with previous results...');
      const diff = compareResults(oldCourses, parsed.courses);
      await writeChangesSheet(diff, parsed.university);
      setStatus('success',
        `✅ Done! ${parsed.total_courses} courses classified. Changes: +${diff.added.length} added, -${diff.removed.length} removed, ~${diff.reclassified.length} reclassified. See "AI Review" and "Changes" sheets.`);
    } else {
      setStatus('success',
        `✅ Done! ${parsed.total_courses} courses classified, ${parsed.flagged_count} flagged. See "AI Review" sheet.`);
    }
    renderPreview(parsed);

  } catch (e) {
    setStatus('error', '❌ ' + e.message);
  } finally {
    document.getElementById('analyzeBtn').disabled = false;
  }
}

// ── Read existing AI Review sheet ───────────────────────────────
async function readExistingReview() {
  try {
    let courses = null;
    await Excel.run(async (ctx) => {
      const sheet = ctx.workbook.worksheets.getItem('AI Review');
      const range = sheet.getUsedRange();
      range.load('values');
      await ctx.sync();
      const values = range.values;
      courses = [];
      // Rows 0=title, 1=summary, 2=header, 3+ = data
      for (let i = 3; i < values.length; i++) {
        const row = values[i];
        if (row[0]) courses.push({
          name: String(row[0]).trim(),
          ects: row[1], type: row[2],
          scope: row[3], area: row[4],
          confidence: row[5],
          flag: row[6] === 'YES',
          flag_reason: row[7]
        });
      }
    });
    return courses && courses.length > 0 ? courses : null;
  } catch (_) { return null; }
}

// ── Compare old vs new courses (exact name match) ───────────────
function compareResults(oldCourses, newCourses) {
  const oldMap = new Map(oldCourses.map(c => [c.name.toLowerCase(), c]));
  const newMap = new Map(newCourses.map(c => [c.name.toLowerCase(), c]));
  const added = [], removed = [], reclassified = [], unchanged = [];
  for (const [key, nc] of newMap) {
    if (!oldMap.has(key)) { added.push(nc); continue; }
    const oc = oldMap.get(key);
    if (oc.scope !== nc.scope || oc.area !== nc.area)
      reclassified.push({ course: nc, oldScope: oc.scope, oldArea: oc.area });
    else unchanged.push(nc);
  }
  for (const [key, oc] of oldMap) {
    if (!newMap.has(key)) removed.push(oc);
  }
  return { added, removed, reclassified, unchanged };
}

// ── Write Changes sheet ─────────────────────────────────────────
async function writeChangesSheet(diff, university) {
  await Excel.run(async (ctx) => {
    const wb = ctx.workbook;
    try { wb.worksheets.getItem('Changes').delete(); await ctx.sync(); } catch (_) {}
    const sheet = wb.worksheets.add('Changes');

    const writeTitle = (range, text, bg) => {
      range.merge();
      range.values = [[text]];
      range.format.font.bold = true;
      range.format.font.size = 11;
      range.format.font.color = '#FFFFFF';
      range.format.fill.color = bg;
      range.format.rowHeight = 22;
      range.format.horizontalAlignment = 'Left';
      range.format.indentLevel = 1;
    };

    const writeHeader = (range, cols) => {
      range.values = [cols];
      range.format.font.bold = true;
      range.format.font.color = '#FFFFFF';
      range.format.fill.color = '#1e3a5f';
      range.format.rowHeight = 20;
    };

    // Page title
    const pageTitle = sheet.getRange('A1:G1');
    pageTitle.merge();
    pageTitle.values = [[`Curriculum Changes — ${university || 'Unknown'}  ·  ${new Date().toLocaleDateString()}`]];
    pageTitle.format.font.bold = true;
    pageTitle.format.font.size = 13;
    pageTitle.format.font.color = '#FFFFFF';
    pageTitle.format.fill.color = '#1e3a5f';
    pageTitle.format.rowHeight = 28;
    pageTitle.format.horizontalAlignment = 'Center';

    // Summary row
    const sumR = sheet.getRange('A2:G2');
    sumR.merge();
    sumR.values = [[`+${diff.added.length} added  ·  -${diff.removed.length} removed  ·  ~${diff.reclassified.length} reclassified  ·  ${diff.unchanged.length} unchanged`]];
    sumR.format.font.italic = true;
    sumR.format.font.size = 10;
    sumR.format.font.color = '#64748b';
    sumR.format.fill.color = '#f8fafc';
    sumR.format.rowHeight = 18;

    let row = 3;

    // ── ADDED ──
    writeTitle(sheet.getRange(`A${row}:G${row}`), `✅  Added (${diff.added.length} new courses)`, '#166534');
    row++;
    writeHeader(sheet.getRange(`A${row}:G${row}`), ['Course Name','ECTS','Type','Scope','Scientific Area','Confidence','Flagged']);
    row++;
    if (diff.added.length > 0) {
      const addData = diff.added.map(c => [c.name, c.ects ?? '', c.type, c.scope, c.area, c.confidence, c.flag ? 'YES' : 'NO']);
      sheet.getRangeByIndexes(row - 1, 0, addData.length, 7).values = addData;
      for (let i = 0; i < addData.length; i++) {
        sheet.getRangeByIndexes(row - 1 + i, 0, 1, 7).format.fill.color = i % 2 === 0 ? '#f0fdf4' : '#ffffff';
        sheet.getRangeByIndexes(row - 1 + i, 0, 1, 7).format.rowHeight = 15;
      }
      row += addData.length;
    }
    row++;

    // ── REMOVED ──
    writeTitle(sheet.getRange(`A${row}:G${row}`), `🗑️  Removed (${diff.removed.length} courses no longer in curriculum)`, '#991b1b');
    row++;
    writeHeader(sheet.getRange(`A${row}:G${row}`), ['Course Name','ECTS','Type','Last Scope','Last Area','Last Confidence','']);
    row++;
    if (diff.removed.length > 0) {
      const remData = diff.removed.map(c => [c.name, c.ects ?? '', c.type, c.scope, c.area, c.confidence, '']);
      sheet.getRangeByIndexes(row - 1, 0, remData.length, 7).values = remData;
      for (let i = 0; i < remData.length; i++) {
        sheet.getRangeByIndexes(row - 1 + i, 0, 1, 7).format.fill.color = i % 2 === 0 ? '#fff1f2' : '#ffffff';
        sheet.getRangeByIndexes(row - 1 + i, 0, 1, 7).format.rowHeight = 15;
      }
      row += remData.length;
    }
    row++;

    // ── RECLASSIFIED ──
    writeTitle(sheet.getRange(`A${row}:G${row}`), `🔄  Reclassified (${diff.reclassified.length} courses with changed classification)`, '#92400e');
    row++;
    writeHeader(sheet.getRange(`A${row}:G${row}`), ['Course Name','ECTS','Previous Scope','Previous Area','New Scope','New Area','']);
    row++;
    if (diff.reclassified.length > 0) {
      const recData = diff.reclassified.map(r => [r.course.name, r.course.ects ?? '', r.oldScope, r.oldArea, r.course.scope, r.course.area, '']);
      sheet.getRangeByIndexes(row - 1, 0, recData.length, 7).values = recData;
      for (let i = 0; i < recData.length; i++) {
        sheet.getRangeByIndexes(row - 1 + i, 0, 1, 7).format.fill.color = i % 2 === 0 ? '#fffbeb' : '#ffffff';
        sheet.getRangeByIndexes(row - 1 + i, 0, 1, 7).format.rowHeight = 15;
      }
      row += recData.length;
    }

    // Column widths
    [44, 6, 28, 28, 28, 28, 10].forEach((w, i) => {
      sheet.getRange(`${String.fromCharCode(65+i)}:${String.fromCharCode(65+i)}`).format.columnWidth = w * 7;
    });

    sheet.freezePanes.freezeRows(3);
    sheet.activate();
    await ctx.sync();
  });
}

// ── Write to Excel ──────────────────────────────────────────────
async function writeToExcel(data) {
  await Excel.run(async (ctx) => {
    const wb = ctx.workbook;

    // Remove old AI Review sheet if exists
    try {
      wb.worksheets.getItem('AI Review').delete();
      await ctx.sync();
    } catch (_) {}

    const sheet = wb.worksheets.add('AI Review');

    // Title
    const titleR = sheet.getRange('A1:I1');
    titleR.merge();
    titleR.values = [['IEM AI Quality Check — ' + (data.university || 'Unknown')]];
    titleR.format.font.bold  = true;
    titleR.format.font.size  = 13;
    titleR.format.font.color = '#FFFFFF';
    titleR.format.fill.color = '#1e3a5f';
    titleR.format.rowHeight  = 28;
    titleR.format.horizontalAlignment = 'Center';
    titleR.format.verticalAlignment   = 'Center';

    // Summary
    const summaryR = sheet.getRange('A2:I2');
    summaryR.merge();
    summaryR.values = [[`Total: ${data.total_courses} courses  ·  Flagged: ${data.flagged_count}  ·  ${new Date().toLocaleDateString()}`]];
    summaryR.format.font.italic = true;
    summaryR.format.font.size   = 10;
    summaryR.format.font.color  = '#64748b';
    summaryR.format.fill.color  = '#f8fafc';
    summaryR.format.rowHeight   = 18;

    // Header
    const headerR = sheet.getRange('A3:I3');
    headerR.values = [['Course Name','ECTS','Type','Scope','Scientific Area','Confidence','Flagged','Flag Reason','Validated?']];
    headerR.format.font.bold  = true;
    headerR.format.font.color = '#FFFFFF';
    headerR.format.fill.color = '#1e3a5f';
    headerR.format.rowHeight  = 24;
    headerR.format.horizontalAlignment = 'Center';

    // Data
    if (data.courses && data.courses.length > 0) {
      const rows = data.courses.map(c => [
        c.name  || '',
        c.ects  !== null && c.ects !== undefined ? c.ects : '',
        c.type  || 'Unknown',
        c.scope || '',
        c.area  || '',
        c.confidence || '',
        c.flag  ? 'YES' : 'NO',
        c.flag_reason || '',
        ''
      ]);

      const dataR = sheet.getRangeByIndexes(3, 0, rows.length, 9);
      dataR.values = rows;

      for (let i = 0; i < rows.length; i++) {
        const rowR = sheet.getRangeByIndexes(3 + i, 0, 1, 9);
        rowR.format.fill.color = data.courses[i].flag ? '#fff7ed' : (i % 2 === 0 ? '#ffffff' : '#f8fafc');
        rowR.format.rowHeight  = 16;
      }

      // Red bold for flagged YES cells
      for (let i = 0; i < data.courses.length; i++) {
        if (data.courses[i].flag) {
          const cell = sheet.getRangeByIndexes(3 + i, 6, 1, 1);
          cell.format.font.color = '#dc2626';
          cell.format.font.bold  = true;
        }
      }
    }

    // Column widths (approximate px via character units)
    [42, 6, 12, 34, 28, 12, 10, 36, 12].forEach((w, i) => {
      sheet.getRange(
        String.fromCharCode(65 + i) + ':' + String.fromCharCode(65 + i)
      ).format.columnWidth = w * 7;
    });

    sheet.freezePanes.freezeRows(3);
    sheet.activate();
    await ctx.sync();
  });
}

// ── UI helpers ──────────────────────────────────────────────────
function setStatus(type, msg) {
  document.getElementById('statusArea').innerHTML =
    `<div class="status ${type}">${msg}</div>`;
}

function scopeClass(scope) {
  return {
    'Sciences': 'badge-sciences',
    'Engineering': 'badge-engineering',
    'Applied Industrial and Management Engineering': 'badge-iem',
    'Management': 'badge-management',
    'Transversal': 'badge-transversal',
    'Other': 'badge-other',
  }[scope] || 'badge-other';
}

function renderPreview(data) {
  const flagged = data.courses.filter(c => c.flag).length;
  document.getElementById('resultsArea').innerHTML = `
    <div class="results">
      <div class="divider"></div>
      <h3>Preview</h3>
      <div class="stats">
        <div class="stat"><div class="val">${data.total_courses}</div><div class="lbl">Courses</div></div>
        <div class="stat flagged"><div class="val">${flagged}</div><div class="lbl">Flagged</div></div>
      </div>
      <div class="course-list">
        ${data.courses.slice(0, 40).map(c => `
          <div class="course-item ${c.flag ? 'flagged' : ''}">
            <div class="course-name">${c.name}</div>
            <div class="course-meta">
              <span class="badge ${scopeClass(c.scope)}">${c.scope === 'Applied Industrial and Management Engineering' ? 'IEM' : c.scope}</span>
              ${c.flag ? '<span style="font-size:11px">🚩</span>' : ''}
            </div>
          </div>`).join('')}
        ${data.courses.length > 40
          ? `<div class="course-item"><div class="course-name" style="color:#94a3b8">+ ${data.courses.length - 40} more in sheet…</div></div>`
          : ''}
      </div>
      <p class="note">Full results written to the "AI Review" sheet in this workbook.</p>
    </div>`;
}
</script>
</body>
</html>
